name: Publish Theme Library
on:
  push:
    branches: [ "hotfix/**" ]
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    defaults:
      run:
        working-directory: . 

    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Publish with Gradle
        run: ./gradlew :theme:publishReleasePublicationToGitHubPackagesRepository
        # working-directory: MultiModule # Use this if it's not in the root
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_GITHUB_TOKEN }}
